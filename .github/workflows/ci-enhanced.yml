name: CI

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check identark/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: mypy identark/

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pip-audit
      - run: pip install -e ".[all]"
      - name: Run pip-audit
        run: pip-audit --strict --desc
        continue-on-error: true  # Don't block CI, but surface findings
      - name: Check for known vulnerabilities
        run: pip-audit --format=json --output=audit-results.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: audit-results.json
        if: always()

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev,all]"
      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=identark --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: coverage.xml
          flags: unittests
        continue-on-error: true

  test-minimum-deps:
    name: Test (Minimum Dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"  # Minimum supported version
          cache: pip
      - name: Install with minimum versions
        run: |
          pip install "httpx==0.26.0"  # Minimum httpx
          pip install -e ".[dev]"
      - name: Run core tests
        run: pytest tests/unit/test_models.py tests/unit/test_exceptions.py tests/unit/test_gateways.py -v

  build-verify:
    name: Build & Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install build twine
      - name: Build distribution
        run: python -m build
      - name: Verify package
        run: twine check dist/*
      - name: Check package contents
        run: |
          echo "=== Package contents ==="
          python -m zipfile -l dist/*.whl | head -30
          echo ""
          echo "=== Package size ==="
          ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,openai]"
      - name: Run SDK overhead benchmark
        run: python benchmarks/benchmark_sdk_overhead.py
        continue-on-error: true

  # NOTE: PyPI publishing lives in a SINGLE workflow (ci.yml → publish job).
  # Having multiple publish jobs fire on the same v* tag caused racing uploads
  # where the first won and the rest failed with "file already exists",
  # turning every release red. Do not re-add a publish job here.
