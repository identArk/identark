name: CI

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check identark/ tests/

      - name: Type check with mypy
        run: mypy identark/

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=identark --cov-report=xml

      - name: Run SDK benchmarks
        run: |
          pip install pytest-benchmark
          python benchmarks/benchmark_sdk_overhead.py
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # NOTE: PyPI publishing lives ONLY in publish.yml (workflow name
  # "Publish to PyPI"), which is the workflow PyPI's trusted publisher is
  # registered against. Do not add a publish job here — publishing from a
  # different workflow filename fails OIDC with "invalid-publisher".
